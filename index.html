<!DOCTYPE html>
<html>
<head>
<title>IPL Auction PRO</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg"></div>

<header>🏏 IPL AUCTION PRO - PUBG LOBBY MODE</header>

<div class="main">

<!-- LEFT PANEL -->
<div class="panel left">

    <div class="card big">
        <h2>🎮 PLAYER LOBBY</h2>

        <div id="playerCard"></div>

        <div class="buttons">
            <button onclick="randomPlayer()">🎲 NEXT RANDOM PLAYER</button>
            <button onclick="increaseBid()">⬆ INCREASE BID</button>
            <button class="buy" onclick="buyPlayer()">💰 BUY PLAYER</button>
        </div>

        <p id="bidInfo"></p>
    </div>

    <div class="card">
        <h2>🏆 WINNER ANALYSIS</h2>
        <button onclick="analyze()">CHECK WINNER</button>
        <p id="analysis"></p>
    </div>

</div>

<!-- RIGHT PANEL -->
<div class="panel right">

    <div class="card">
        <h2>👥 ACTIVE TEAM</h2>
        <button onclick="switchTeam()">SWITCH TEAM</button>
        <p id="teamInfo"></p>
    </div>

    <div class="card">
        <h2>📊 STATS DASHBOARD</h2>
        <div id="stats"></div>
    </div>

    <div class="card">
        <h2>🏟 TEAMS</h2>
        <div id="teams"></div>
    </div>

</div>

</div>

<script src="script.js"></script>
</body>
</html>

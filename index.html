<!DOCTYPE html>
<html>
<head>
<title>IPL Auction Pro</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>🏏 IPL MEGA AUCTION SIMULATOR</header>

<div class="container">

<!-- LEFT PANEL -->
<div class="panel">

    <div class="card">
        <h2>PLAYER CARD</h2>
        <div id="playerCard">Loading...</div>

        <button onclick="nextPlayer()">Next Player</button>
        <button onclick="increaseBid()">Increase Bid</button>
        <button class="buy" onclick="buyPlayer()">Buy Player</button>

        <p id="bidInfo"></p>
    </div>

    <div class="card">
        <h2>TEAM CONTROL</h2>
        <button onclick="switchTeam()">Switch Team</button>
        <p id="currentTeam"></p>
    </div>

</div>

<!-- RIGHT PANEL -->
<div class="panel">

    <div class="card">
        <h2>📊 DASHBOARD</h2>
        <div id="dashboard"></div>
    </div>

    <div class="card">
        <h2>🏆 WINNER ANALYSIS</h2>
        <button onclick="analyze()">Run Analysis</button>
        <p id="analysis"></p>
    </div>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
